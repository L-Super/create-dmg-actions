name: 'create macOS dmg'
description: 'Create dmg on macOS by actions'
author: 'L-Super'

branding:
  icon: 'box'
  color: 'green'

inputs:
  src_dir:
    description: 'Path of the Application Bundle.'
    required: true
  dmg_name:
    description: 'Set the name of the output DMG file.'
    required: true
  background:
    description:
      'Path to a custom background image (SVG/PNG). Uses a built-in arrow
      background if not set.'
    required: false
  window_size:
    description: 'DMG window size as WxH (e.g. 660x400).'
    required: false
    default: '660x400'
  icon_size:
    description: 'Icon size in pixels.'
    required: false
    default: '100'
  icon_position:
    description: 'App icon position as "X Y".'
    required: false
    default: '160 185'
  app_drop_link:
    description: 'Applications shortcut position as "X Y".'
    required: false
    default: '500 185'

outputs:
  dmg_path:
    description: 'The file name of the generated DMG (e.g. MyApp.dmg).'

runs:
  using: node22
  main: dist/index.js
